{{ define "main" }}

<div
  class="flex w-full flex-col items-center justify-start space-y-6 bg-gray-200 px-4 pb-12 dark:bg-gray-900 sm:px-6 md:space-y-12 lg:px-10 xl:px-12"
>
  <h1>{{ .Title }}</h1>
  {{ .Content }} {{ range .Pages }}
  <img src="{{ .Params.images }}" alt="" />
  <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
  {{ .Summary }} {{ end }}
</div>
{{ end }}
